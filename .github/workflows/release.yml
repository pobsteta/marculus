name: Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Calcule la prochaine version SemVer d'après les commits (conventional commits) :
      #   feat: → mineur · fix: → patch · BREAKING CHANGE / ! → majeur · sinon → patch.
      - name: Calculer la version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          tag_prefix: v

      - name: Configurer JDK 21
        if: steps.tag.outputs.new_tag != ''
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configurer le SDK Android
        if: steps.tag.outputs.new_tag != ''
        uses: android-actions/setup-android@v3

      - name: Configurer Gradle
        if: steps.tag.outputs.new_tag != ''
        uses: gradle/actions/setup-gradle@v4

      - name: Préparer la clé de signature release
        if: steps.tag.outputs.new_tag != ''
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "RELEASE_KEYSTORE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "Clé release détectée → APK signé release (mises à jour possibles)."
          else
            echo "Aucune clé release (secret RELEASE_KEYSTORE_BASE64 absent) → repli signature debug."
          fi

      - name: Compiler l'APK release
        if: steps.tag.outputs.new_tag != ''
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: >
          ./gradlew :app:assembleRelease --no-daemon
          -PappVersionName=${{ steps.tag.outputs.new_version }}
          -PappVersionCode=${{ github.run_number }}

      - name: Nommer l'APK (préfixe marculus + version + horodatage UTC)
        if: steps.tag.outputs.new_tag != ''
        id: apk
        run: |
          NAME="marculus-${{ steps.tag.outputs.new_tag }}-$(date -u +%Y%m%d-%H%M).apk"
          cp app/build/outputs/apk/release/app-release.apk "$NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Créer la release GitHub
        if: steps.tag.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: Marculus ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          files: ${{ steps.apk.outputs.name }}
