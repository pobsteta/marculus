name: Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Calcule la prochaine version SemVer d'après les commits (conventional commits) :
      #   feat: → mineur · fix: → patch · BREAKING CHANGE / ! → majeur · sinon → patch.
      - name: Calculer la version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          tag_prefix: v

      - name: Configurer JDK 21
        if: steps.tag.outputs.new_tag != ''
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configurer le SDK Android
        if: steps.tag.outputs.new_tag != ''
        uses: android-actions/setup-android@v3

      - name: Configurer Gradle
        if: steps.tag.outputs.new_tag != ''
        uses: gradle/actions/setup-gradle@v4

      - name: Compiler l'APK release (signé debug)
        if: steps.tag.outputs.new_tag != ''
        run: >
          ./gradlew :app:assembleRelease --no-daemon
          -PappVersionName=${{ steps.tag.outputs.new_version }}
          -PappVersionCode=${{ github.run_number }}

      - name: Renommer l'APK
        if: steps.tag.outputs.new_tag != ''
        run: cp app/build/outputs/apk/release/app-release.apk marculus-${{ steps.tag.outputs.new_tag }}.apk

      - name: Créer la release GitHub
        if: steps.tag.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: Marculus ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          files: marculus-${{ steps.tag.outputs.new_tag }}.apk
