name: Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Configurer JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configurer Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Générer le rapport de couverture
        run: ./gradlew :core:test :core:jacocoTestReport --no-daemon

      - name: Assembler le site (accueil + couverture)
        run: |
          mkdir -p site/coverage
          cp -r web/. site/
          cp -r core/build/reports/jacoco/html/. site/coverage/

      - name: Téléverser l'artefact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
